# Netlify — generate config.js from env vars before publish
[build]
  publish = "."
  command = "bash scripts/generate-config.sh"

[build.environment]
  # Set in Netlify dashboard: Site settings → Environment variables
  # SUPABASE_URL, SUPABASE_ANON_KEY

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
