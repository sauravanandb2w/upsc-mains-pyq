<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" role="img" aria-label="Rig Vedic vs Later Vedic society and economy comparison">
  <defs>
    <style>
      .title { font: 700 18px 'Segoe UI', system-ui, sans-serif; fill: #1c1917; }
      .subtitle { font: 600 13px 'Segoe UI', system-ui, sans-serif; fill: #9a3412; }
      .header { font: 700 14px 'Segoe UI', system-ui, sans-serif; fill: #fff; }
      .cell-title { font: 700 12px 'Segoe UI', system-ui, sans-serif; fill: #9a3412; }
      .text { font: 500 11px 'Segoe UI', system-ui, sans-serif; fill: #44403c; }
      .arrow-label { font: 600 11px 'Segoe UI', system-ui, sans-serif; fill: #9a3412; }
      .rig-bg { fill: #fff7ed; stroke: #d6d3d1; stroke-width: 1.5; }
      .later-bg { fill: #fef3c7; stroke: #d6d3d1; stroke-width: 1.5; }
      .rig-head { fill: #78716c; }
      .later-head { fill: #9a3412; }
      .arrow { stroke: #9a3412; stroke-width: 2.5; fill: none; marker-end: url(#arr); }
    </style>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#9a3412"/>
    </marker>
  </defs>

  <!-- Title -->
  <text class="title" x="360" y="28" text-anchor="middle">Rig Vedic to Later Vedic Period</text>
  <text class="subtitle" x="360" y="48" text-anchor="middle">Changes in Society &amp; Economy · GS I 2024 Q.1</text>

  <!-- Column headers -->
  <rect class="rig-head" x="30" y="62" width="300" height="32" rx="6"/>
  <text class="header" x="180" y="83" text-anchor="middle">RIG VEDIC</text>
  <rect class="later-head" x="390" y="62" width="300" height="32" rx="6"/>
  <text class="header" x="540" y="83" text-anchor="middle">LATER VEDIC</text>

  <!-- Center arrow -->
  <path class="arrow" d="M 340 260 L 378 260"/>
  <text class="arrow-label" x="360" y="252" text-anchor="middle">CHANGE</text>

  <!-- SOCIETY row label -->
  <text class="cell-title" x="360" y="108" text-anchor="middle"> SOCIETY </text>

  <!-- Society Rig -->
  <rect class="rig-bg" x="30" y="118" width="300" height="130" rx="8"/>
  <text class="text" x="45" y="138">" Tribal <tspan font-weight="700">jana</tspan>  clan identity</text>
  <text class="text" x="45" y="156">" Relatively egalitarian kinship</text>
  <text class="text" x="45" y="174">" Women: Sabha &amp; Samiti roles</text>
  <text class="text" x="45" y="192">" No rigid varna system yet</text>
  <text class="text" x="45" y="210">" Pastoral warrior ethos</text>
  <text class="text" x="45" y="228">" Nature-deity worship (Indra, Agni)</text>

  <!-- Society Later -->
  <rect class="later-bg" x="390" y="118" width="300" height="130" rx="8"/>
  <text class="text" x="405" y="138">" Territorial <tspan font-weight="700">janapada</tspan> / kingdoms</text>
  <text class="text" x="405" y="156">" <tspan font-weight="700">Varna</tspan> hierarchy crystallises</text>
  <text class="text" x="405" y="174">" Women's public role declines</text>
  <text class="text" x="405" y="192">" Gotra exogamy; joint family</text>
  <text class="text" x="405" y="210">" Four ashramas elaborated</text>
  <text class="text" x="405" y="228">" Ritual Brahmin dominance ‘</text>

  <!-- ECONOMY row label -->
  <text class="cell-title" x="360" y="268" text-anchor="middle"> ECONOMY </text>

  <!-- Economy Rig -->
  <rect class="rig-bg" x="30" y="278" width="300" height="130" rx="8"/>
  <text class="text" x="45" y="298">" <tspan font-weight="700">Pastoralism</tspan>  cattle = wealth</text>
  <text class="text" x="45" y="316">" Limited agriculture</text>
  <text class="text" x="45" y="334">" Open grazing lands</text>
  <text class="text" x="45" y="352">" Bali  voluntary tribute</text>
  <text class="text" x="45" y="370">" Barter exchange</text>
  <text class="text" x="45" y="388">" Sapta Sindhu region focus</text>

  <!-- Economy Later -->
  <rect class="later-bg" x="390" y="278" width="300" height="130" rx="8"/>
  <text class="text" x="405" y="298">" <tspan font-weight="700">Plough agriculture</tspan> dominant</text>
  <text class="text" x="405" y="316">" Iron tools; forest clearance</text>
  <text class="text" x="405" y="334">" Land rights &amp; surplus produce</text>
  <text class="text" x="405" y="352">" Regular tax: bhaga, bali, shulka</text>
  <text class="text" x="405" y="370">" Craft specialisation &amp; trade</text>
  <text class="text" x="405" y="388">" Gangetic valley expansion</text>

  <!-- Footer summary -->
  <rect x="30" y="430" width="660" height="72" rx="8" fill="#f5f5f4" stroke="#e7e5e4" stroke-width="1.5"/>
  <text class="cell-title" x="45" y="452">Key transition:</text>
  <text class="text" x="45" y="472">Pastoral tribal society ’ settled agrarian kingdoms · Clan equality ’ birth-based varna order ·</text>
  <text class="text" x="45" y="490">Cattle economy ’ land &amp; surplus-based taxation · Sapta Sindhu ’ eastern Gangetic heartland</text>
</svg>
